name: Pester Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell 7.6
        uses: PowerShell/PowerShell@v2
        with:
          version: '7.6.x'

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser

      - name: Run Tests
        shell: pwsh
        run: Invoke-Pester -Path Tests -Output Detailed
