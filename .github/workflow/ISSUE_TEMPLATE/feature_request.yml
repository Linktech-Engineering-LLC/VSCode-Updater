name: Feature request
description: Suggest an enhancement or new capability for VSCode-Updater
labels: [enhancement]

body:
  - type: textarea
    attributes:
      label: Summary
      description: A clear description of the feature or enhancement.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Motivation
      description: Explain why this feature is useful or necessary.
      placeholder: |
        - Improves reliability
        - Enhances logging
        - Adds new operator-grade behavior
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed Solution
      description: Describe how the feature could work or be implemented.
      placeholder: |
        - Add new watchdog event for stalled downloads
        - Extend exit-code mapping for additional installer states

  - type: textarea
    attributes:
      label: Additional Context
      description: Any other information, examples, or references.
