name: Bug report
description: Report a reproducible issue in VSCode-Updater
labels: [bug]

body:
  - type: textarea
    attributes:
      label: Description
      description: A clear and concise description of the issue.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Provide exact steps to reproduce the issue.
      placeholder: |
        1. Run Update-VSCode
        2. Observe installer behavior
        3. Capture logs or output
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actual Behavior
      description: What actually happened, including any logs or error messages.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Environment
      description: OS version, PowerShell version, module version, and any relevant environment details.
      placeholder: |
        - Windows 11 23H2
        - PowerShell 7.4.1
        - VSCode-Updater v2.0.0
    validations:
      required: true

  - type: textarea
    attributes:
      label: Logs
      description: Attach or paste relevant log excerpts (sanitize sensitive paths).
      placeholder: |
        [2026-04-09 08:12:44] [INFO] Starting update lifecycle...
        [2026-04-09 08:12:45] [WARN] Installer returned exit code 1638
